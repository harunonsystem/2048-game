name: 'Load 1Password Secrets'
description: 'Load secrets from 1Password vault with proper error handling'
inputs:
  export-env:
    description: 'Export secrets as environment variables'
    required: false
    default: 'true'
outputs:
  CLOUDFLARE_API_TOKEN:
    description: 'Cloudflare API Token loaded from 1Password'
    value: ${{ steps.op-load-secret.outputs.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID:
    description: 'Cloudflare Account ID loaded from 1Password'
    value: ${{ steps.op-load-secret.outputs.CLOUDFLARE_ACCOUNT_ID }}
  VITE_UMAMI_WEBSITE_ID_2048_GAME:
    description: 'Umami website ID for the 2048-game site, loaded from 1Password'
    value: ${{ steps.op-load-secret.outputs.VITE_UMAMI_WEBSITE_ID_2048_GAME }}
runs:
  using: 'composite'
  steps:
    - name: Load 1Password secrets
      id: op-load-secret
      uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
      with:
        export-env: false
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ env.OP_SERVICE_ACCOUNT_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: op://harunonpj/CLOUDFLARE_ACCOUNT_ID/harunonpj
        CLOUDFLARE_API_TOKEN: op://harunonpj/CLOUDFLARE_API_TOKEN/harunonpj
        VITE_UMAMI_WEBSITE_ID_2048_GAME: op://harunonpj/VITE_UMAMI_WEBSITE_ID_2048_GAME/2048-game

    - name: Verify secrets loaded
      shell: bash
      run: |
        # Verify secrets are loaded without exposing values in logs
        if [ -z "${{ steps.op-load-secret.outputs.CLOUDFLARE_ACCOUNT_ID }}" ]; then
          echo "❌ CLOUDFLARE_ACCOUNT_ID not loaded"
          exit 1
        fi
        if [ -z "${{ steps.op-load-secret.outputs.CLOUDFLARE_API_TOKEN }}" ]; then
          echo "❌ CLOUDFLARE_API_TOKEN not loaded"
          exit 1
        fi
        if [ -z "${{ steps.op-load-secret.outputs.VITE_UMAMI_WEBSITE_ID_2048_GAME }}" ]; then
          echo "❌ VITE_UMAMI_WEBSITE_ID_2048_GAME not loaded"
          exit 1
        fi
        echo "✅ All secrets loaded successfully"

    - name: Output secrets as environment variables
      if: ${{ inputs.export-env == 'true' }}
      shell: bash
      run: |
        echo "Exporting secrets as environment variables"
        echo "CLOUDFLARE_ACCOUNT_ID=${{ steps.op-load-secret.outputs.CLOUDFLARE_ACCOUNT_ID }}" >> $GITHUB_ENV
        echo "VITE_UMAMI_WEBSITE_ID_2048_GAME=${{ steps.op-load-secret.outputs.VITE_UMAMI_WEBSITE_ID_2048_GAME }}" >> $GITHUB_ENV
